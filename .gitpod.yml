image: gitpod/workspace-node-lts

tasks:
  - name: bootstrap
    init: |
      [ -f .env ] || cp .env.example .env
      mkdir -p data .runtime
      npm ci
      npm run prisma:generate
      npm run prisma:push
    command: npm run dev

ports:
  - port: 8000
    name: Daily News Agent
    onOpen: open-preview
    visibility: private

vscode:
  extensions:
    - dbaeumer.vscode-eslint
    - esbenp.prettier-vscode
    - Prisma.prisma
